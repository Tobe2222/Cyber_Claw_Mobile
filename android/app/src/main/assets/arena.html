<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta charset="utf-8">
<title>CyberClaw Mobile Arena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:#0a0a2e;
  overflow:hidden;
  width:100vw;height:100vh;
  touch-action:none;
  font-family:'Orbitron',monospace;
}
canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  z-index:1;
}
#ctrlRight{
  position:absolute;top:6px;right:6px;
  display:flex;gap:4px;z-index:20;pointer-events:all;
}
.ctrlBtn{
  background:rgba(0,0,0,0.72);
  border:1px solid rgba(247,147,26,0.45);
  color:#f7931a;
  font-size:9px;
  width:80px;height:24px;
  border-radius:6px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;
  white-space:nowrap;
}
.ctrlBtn:active{background:rgba(247,147,26,0.25)}
.ctrlBtn.active{border-color:#4ade80;color:#4ade80}
body.wake-mode #ctrlRight{display:none!important}
#status{
  position:absolute;top:8px;left:0;right:0;
  text-align:center;
  color:#888;font-size:11px;
  z-index:10;pointer-events:none;
  letter-spacing:1px;
  text-transform:uppercase;
}
#status.error{color:#f7931a}
#status.ok{color:#4ade80}
/* v3.1.48: debug overlay removed (Tobe asked). Kept getDebug()
   exposed on window.Arena for ad-hoc inspection via RN. */
</style>
</head>
<body>
<canvas id="arena"></canvas>
<div id="status">Loading arena…</div>
<!-- v3.1.46: Voice Mode and Wake Mode buttons (overlay on the
     arena). Send messages to React Native via ReactNativeWebView.
     The RN side handles 'fullscreen' and 'wakeword' messages.
     v3.1.51: the inline display:none was a v3.1.50 mistake that
     hid the buttons in the home screen. The CSS rule
     `body.wake-mode #ctrlRight { display:none }` already hides
     them in wake mode (since the wake mode IS the wake screen). -->
<div id="ctrlRight">
  <button class="ctrlBtn" id="voiceBtn" title="Enter Voice Mode"
    onclick="try { if(window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify({type:'wakeword'})); } catch(e) {}">Voice Mode</button>
  <button class="ctrlBtn" id="wakeWordBtn" title="Activate Wake Word Mode"
    onclick="try { if(window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify({type:'wakeword'})); } catch(e) {}">Wake Mode</button>
</div>
<script>
'use strict';

// ── CyberClaw Mobile Arena (v3.1.43) ──────────────────────────────
//
// CLEAN REWRITE after v3.1.39 → v3.1.42 failed to land positioning
// and animation behavior. This is a minimal port of the desktop's
// pixel-arena.js state machine — same animation conventions, same
// sprite sheet layout, same direction encoding. We just strip
// toys/treats/sleep/click and constrain the arena to a single
// ground line (no Y movement).
//
// Key design decisions:
// - Explicit canvas size from React Native via Arena.init(W, H).
//   This is the ONLY reliable way to get the WebView's actual size
//   on Android WebView (window.innerHeight returns the full viewport).
// - Animation is driven by c.animation, separate from c.state, like
//   the desktop. If the walk PNG fails to load, we try run, then
//   idle — never show a state with no animation.
// - State machine: idle (still) / walk (gentle) / run (fast). On
//   idle, vx=0 and the companion bobs in place. On walk/run, the
//   companion moves horizontally and shows the side-view sprite.
// - Sprite sheet rows: 0=down, 1=up, 2=left, 3=right. Same as desktop.
// - scale: mobile = desktop / 2. Desktop default is 5, so mobile
//   default is 2.5 floored to 2. If desktop sends an explicit
//   scale (e.g. lamasuu at 3), mobile uses 3/2 = 1.
// - Companion floats slightly off the ground line so the shadow
//   renders underneath (matching the desktop feel).
//
(function() {
  const canvas = document.getElementById('arena');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  // v3.1.48: debugEl removed.

  // ── Embedded companion catalog (v3.1.43) ───────────────────
  const EMBEDDED_CATALOG = {
  "companions": [
    {
      "id": "fox",
      "name": "Fox",
      "folder": "Fox",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Fox_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Fox_walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "run": {
          "file": "Fox_Run.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Fox_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Fox_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Fox_Shadow.png"
    },
    {
      "id": "boar",
      "name": "Boar",
      "folder": "Boar",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Boar_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Boar_Walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "run": {
          "file": "Boar_Run.png",
          "cols": 5,
          "rows": 4,
          "frames": 5,
          "speed": 10
        },
        "attack": {
          "file": "Boar_Attack.png",
          "cols": 5,
          "rows": 4,
          "frames": 5,
          "speed": 8
        },
        "hurt": {
          "file": "Boar_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Boar_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Boar_shadow.png"
    },
    {
      "id": "deer",
      "name": "Deer",
      "folder": "Deer",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Deer_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Deer_Walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "run": {
          "file": "Deer_Run.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Deer_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Deer_Death.png",
          "cols": 7,
          "rows": 4,
          "frames": 7,
          "speed": 6
        }
      },
      "shadow": "Deer_Shadow.png"
    },
    {
      "id": "hare",
      "name": "Hare",
      "folder": "Hare",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Hare_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Hare_Walk.png",
          "cols": 5,
          "rows": 4,
          "frames": 5,
          "speed": 8
        },
        "run": {
          "file": "Hare_Run.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Hare_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Hare_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Hare_Shadow.png"
    },
    {
      "id": "black_grouse",
      "name": "Black Grouse",
      "folder": "Black_grouse",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Black_grouse_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Black_grouse_Walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "flight": {
          "file": "Black_grouse_Flight.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Black_grouse_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Black_grouse_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Black_grouse_Shadow.png"
    }
  ]
};

  // ── State ────────────────────────────────────────────
  let catalog = null;
  let companions = [];
  let activeId = null;
  const assetsBase = 'file:///android_asset/companions/';
  let lastFrame = 0;
  // v3.1.48: debugMode removed (overlay turned off).

  // v3.1.43: explicit canvas size from React Native. This is the
  // only reliable way to get the WebView's actual size on Android
  // WebView (window.innerHeight returns the full viewport, which
  // is wrong for the WebView container's size).
  let explicitCanvasW = null;
  let explicitCanvasH = null;

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || '';
  }

  window.addEventListener('error', (ev) => {
    const msg = (ev && (ev.message || (ev.error && ev.error.message))) || 'unknown error';
    setStatus('JS error: ' + msg, 'error');
    notifyRN({ type: 'arena_js_error', message: msg });
  });
  window.addEventListener('unhandledrejection', (ev) => {
    const r = ev && ev.reason;
    const msg = (r && r.message) || String(r) || 'unhandled rejection';
    setStatus('Promise error: ' + msg, 'error');
    notifyRN({ type: 'arena_promise_error', message: msg });
  });

  function loadCatalog() {
    catalog = EMBEDDED_CATALOG;
    if (!catalog || !Array.isArray(catalog.companions)) {
      setStatus('Failed to load companion catalog: bad shape', 'error');
      notifyRN({ type: 'arena_load_failed', error: 'bad catalog shape' });
      return;
    }
    setStatus('Arena ready', 'ok');
    notifyRN({ type: 'arena_loaded', count: catalog.companions.length });
    setTimeout(() => { if (statusEl.textContent === 'Arena ready') { statusEl.textContent = ''; statusEl.className = ''; } }, 2500);
  }

  function loadImage(url) {
    return new Promise((resolve) => {
      const img = new Image();
      let settled = false;
      img.onload = () => { if (!settled) { settled = true; resolve(img); } };
      img.onerror = () => { if (!settled) { settled = true; resolve(null); } };
      // v3.1.43: also timeout after 5s to avoid hanging on missing assets
      setTimeout(() => { if (!settled) { settled = true; resolve(null); } }, 5000);
      img.src = url;
    });
  }

  // v3.1.43: load all available animations for a companion.
  // Returns { idle, walk, run, ... } with the loaded image data.
  // If a sheet is missing on disk, the corresponding key is undefined
  // and pickAnim() will fall back to a different available sheet.
  async function buildCompanion(agent) {
    const pixelId = agent.sprite;
    if (!pixelId) return null;
    const compData = catalog.companions.find(c => c.id === pixelId);
    if (!compData) {
      const fallback = catalog.companions[0];
      if (!fallback) return null;
      return buildCompanion({ ...agent, sprite: fallback.id });
    }
    const images = {};
    const loadResults = {};
    // v3.1.43: try to load each animation; record success/failure
    for (const [animName, animData] of Object.entries(compData.animations || {})) {
      if (!animData || !animData.file) continue;
      const url = assetsBase + compData.folder + '/' + animData.file;
      const img = await loadImage(url);
      if (img) {
        const speed = (typeof animData.speed === 'number' && animData.speed > 0) ? animData.speed : 6;
        images[animName] = {
          img,
          frames: animData.frames || 1,
          cols: animData.cols || animData.frames || 1,
          rows: animData.rows || 1,
          frameInterval: Math.round(1000 / speed),
        };
        loadResults[animName] = 'OK';
      } else {
        loadResults[animName] = 'FAIL';
      }
    }
    let shadowImg = null;
    if (compData.shadow) {
      shadowImg = await loadImage(assetsBase + compData.folder + '/' + compData.shadow);
    }
    // v3.1.44: scale handling. The mobile arena is small; we render
    // every companion at HALF the desktop's scale so the sprites
    // fit the viewport. Concretely:
    //   - If the desktop sends an explicit scale (e.g. 3 for lamasuu),
    //     we use desktopScale / 2.
    //   - If the desktop sends null/undefined, the desktop would have
    //     used its default of 5 → we use 5 / 2 = 2.5 → 2 (floor).
    //   - If the resulting value is < 1, clamp to 1.
    // The mobile no longer uses a hardcoded default — it always
    // reflects what the desktop would show, just at half size.
    const DESKTOP_DEFAULT_SCALE = 5;
    const desktopScale = (typeof agent.scale === 'number' && agent.scale >= 1 && agent.scale <= 8)
        ? agent.scale
        : DESKTOP_DEFAULT_SCALE;
    const scale = Math.max(1, Math.floor(desktopScale / 2));
    return {
      id: agent.id,
      name: agent.name || 'Companion',
      data: compData,
      images,
      shadow: shadowImg,
      scale,
      loadResults,  // v3.1.43: diagnostic
      // v3.1.43: animation state. animation is the sheet to draw;
      // state is the AI state. They can differ (e.g. animation=walk
      // even when state=run, if run sheet is missing).
      state: 'idle',
      animation: 'idle',
      direction: 0,    // 0=down, 1=up, 2=left, 3=right
      vx: 0,
      vy: 0,
      stateTimer: 2000 + Math.random() * 3000, // 2-5s for first roll
      frame: 0,
      frameTimer: 0,
      isActive: false,
    };
  }

  // v3.1.43: pick the best available animation for the desired state.
  // Tries the state, then walk (if we want idle but only walk loaded),
  // then any available. Never returns null if any animation loaded.
  function pickAnimation(c, desiredState) {
    // Prefer the exact state
    if (c.images[desiredState]) return c.images[desiredState];
    // Then try other common ones in priority order
    const fallbackOrder = ['walk', 'run', 'idle', 'attack', 'flight'];
    for (const k of fallbackOrder) {
      if (c.images[k]) return c.images[k];
    }
    // Last resort: first available
    for (const k of Object.keys(c.images)) return c.images[k];
    return null;
  }

  // ── Layout ────────────────────────────────────────────
  function resize() {
    const w = explicitCanvasW != null ? explicitCanvasW : (canvas.clientWidth || 360);
    const h = explicitCanvasH != null ? explicitCanvasH : (canvas.clientHeight || 200);
    if (canvas.width !== w) canvas.width = w;
    if (canvas.height !== h) canvas.height = h;
    notifyRN({ type: 'arena_resize', w, h, windowInnerH: window.innerHeight });
    layout();
  }

  function init(canvasW, canvasH) {
    if (typeof canvasW === 'number' && canvasW > 0) explicitCanvasW = canvasW;
    if (typeof canvasH === 'number' && canvasH > 0) explicitCanvasH = canvasH;
    resize();
  }

  // v3.1.43: ground line. bgImage (1266x631, 2:1 aspect) has grass
  // starting at ~70% of image height. Stretched to canvas, grass
  // is at 0.70 * canvas.height. c.y = groundLine - dh puts feet
  // on the grass.
  const GROUND_FRACTION = 0.70;

  function layout() {
    const n = companions.length;
    if (!n) return;
    const w = canvas.width;
    const h = canvas.height;
    // v3.1.48: only assign initial positions to NEW companions
    // (those without a position yet). Existing companions keep
    // their current position across resize events — that's what
    // the desktop does, and what Tobe expected. Previously
    // layout() reset every companion's x/y on every resize,
    // making them teleport back to starting positions whenever
    // the WebView fired a resize event.
    for (let i = 0; i < n; i++) {
      const c = companions[i];
      if (c._positioned) continue;  // skip already-positioned companions
      const [fw, fh] = c.data.frameSize;
      const dw = fw * c.scale;
      const dh = fh * c.scale;
      c.x = w * (i + 1) / (n + 1) - dw / 2;
      // v3.1.54: Stagger Y starting positions so two companions
      // start at different depths (one closer, one further). The
      // yFrac is now the FEET Y as a fraction of canvas height —
      // previously it was the SPRITE TOP Y, which made larger
      // companions start above the walkable band. With the new
      // feet-based bounds in update() (band is 0.70*h to h), the
      // starting feet positions must be in [0.70, 1.0].
      const yFrac = 0.78 + (i / Math.max(1, n - 1)) * 0.14;  // 0.78 .. 0.92
      c.y = h * yFrac - dh;
      c._positioned = true;
    }
  }

  // ── State Machine ────────────────────────────────────
  // v3.1.48: 4 cardinal directions for walk, plus diagonal for
  // "zoomies" (the 10% run state). The desktop's run state also
  // uses a random angle (any direction, including diagonal) for
  // its "excited zoomies" mode — we match that here so the
  // companion actually moves diagonally sometimes.
  //
  // Direction encoding: 0=down, 1=up, 2=left, 3=right. The
  // sprite sheet row is direction. For diagonal movement we
  // pick the row based on the dominant velocity axis.
  //
  // State distribution: idle 40% / walk 50% / zoomies 10%. No
  // "reset to starting position" — when state goes idle, vx=vy=0
  // and the companion STAYS at whatever position it was at.
  // Position is only set by layout() (initial) and by
  // update()'s velocity application.
  const DIRS = [[0, 1], [0, -1], [-1, 0], [1, 0]];  // cardinal: [dx, dy] for dir 0..3

  // v3.1.55: state machine rewritten to match the desktop's
  // (src/js/pixel-arena.js) exactly. The previous 75% direction
  // bias and 60% idle distribution (v3.1.53) made the companion
  // walk in a straight line for 3-6s before changing direction.
  // On the small mobile arena (230px tall, 69px walkable band),
  // straight-line walks always hit a wall and the companion
  // ping-ponged in the same area — exactly the behaviour Tobe
  // reported as "not strolling randomly in all directions".
  //
  // The desktop does NOT bias direction. It picks a fresh
  // random cardinal direction on EVERY walk/run/zoomies roll.
  // Combined with the velocity-based facing in update() (added
  // in v3.1.55), the result is a natural-looking random stroll
  // even on a small arena.
  //
  // State distribution (from desktop, lines 814-855 of
  // src/js/pixel-arena.js):
  //   - 45% idle
  //   - 30% walk
  //   - 15% run (cardinal)
  //   - 10% zoomies (diagonal)
  // Total moving: 55%. This is the desktop's "feels alive" mix.
  //
  // Speeds (from desktop):
  //   - walk: 0.015-0.025 (slower than v3.1.53's 0.020-0.032)
  //   - run:  0.06-0.10
  //   - zoomies: 0.08-0.13
  //
  // Durations (from desktop):
  //   - idle: 3-8s
  //   - walk: 2-6s
  //   - run:  1-3s
  //   - zoomies: 0.6-1.4s
  function pickState(c) {
    const roll = Math.random();
    if (roll < 0.45) {
      // Idle — chill in one spot, facing down (camera)
      c.state = 'idle';
      c.vx = 0;
      c.vy = 0;
      c.direction = 0;
      c.stateTimer = 3000 + Math.random() * 5000;  // 3-8s
    } else if (roll < 0.75) {
      // Walk — fresh random cardinal direction
      c.state = 'walk';
      c.direction = Math.floor(Math.random() * 4);
      const speed = 0.015 + Math.random() * 0.01;
      c.vx = DIRS[c.direction][0] * speed;
      c.vy = DIRS[c.direction][1] * speed;
      c.stateTimer = 2000 + Math.random() * 4000;  // 2-6s
    } else if (roll < 0.90) {
      // Run — fresh random cardinal direction
      c.state = 'run';
      c.direction = Math.floor(Math.random() * 4);
      const speed = 0.06 + Math.random() * 0.04;
      c.vx = DIRS[c.direction][0] * speed;
      c.vy = DIRS[c.direction][1] * speed;
      c.stateTimer = 1000 + Math.random() * 2000;  // 1-3s
    } else {
      // Zoomies — diagonal random angle, fast dash
      c.state = 'run';
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.08 + Math.random() * 0.05;
      c.vx = Math.cos(angle) * speed;
      c.vy = Math.sin(angle) * speed;
      // Direction is set by the velocity-based facing in update(),
      // not here. That code prefers left/right (side sprites look
      // better for diagonal movement) and only uses up/down when
      // vertical is clearly dominant (>2x horizontal).
      c.stateTimer = 600 + Math.random() * 800;  // 0.6-1.4s
    }
    c.frame = 0;
    c.frameTimer = 0;
  }

  function update(dt) {
    for (const c of companions) {
      c.stateTimer -= dt;
      if (c.stateTimer <= 0) pickState(c);

      // Apply velocity in both axes
      c.x += c.vx * dt;
      c.y += c.vy * dt;

      // Bounce off all 4 edges. The desktop's bounce code only
      // bounces horizontally (y stays on the ground line), but
      // since we're allowing vertical movement here, we need
      // to bounce vertically too. The ground band is roughly
      // the bottom 30% of the canvas (from grass top to canvas
      // bottom). We use groundLine ± some margin.
      const [fw, fh] = c.data.frameSize;
      const dw = fw * c.scale;
      const dh = fh * c.scale;
      const halfW = dw / 2;
      const halfH = dh / 2;
      // Horizontal: full canvas bounce (no direction override —
      // velocity-based facing at the end of update() will pick
      // the right sprite row from the post-bounce vx/vy).
      if (c.x + halfW < 0) { c.x = -halfW; c.vx = Math.abs(c.vx); }
      if (c.x + halfW > canvas.width) { c.x = canvas.width - halfW; c.vx = -Math.abs(c.vx); }

      // v3.1.54: Vertical band is now FEET-relative, not sprite-top.
      // Previously the band was 0.60*h to 0.95*h - dh, which made
      // the walkable HEIGHT = 0.35*h - dh. For larger companions
      // (clawsuu at scale 2, dh=64 on a 230px canvas), the band
      // collapsed to just 16.5px tall — the companion hit a wall
      // every ~0.5s and the bounce code forced direction=0/1,
      // creating the "spam up and down" pattern.
      //
      // New band: feet range from grass-top (0.70*h) to canvas
      // bottom (h), regardless of sprite size. Band height =
      // 0.30*h, same for all companions.
      //   - minY (sprite top when feet at grass top) = 0.70*h - dh
      //   - maxY (sprite top when feet at canvas bottom) = h - dh
      //
      // Bounce only flips velocity, NOT direction — the AI owns
      // direction. Overriding direction on bounce caused the
      // _lastWalkDir to fight the AI's 75% bias.
      const minY = canvas.height * 0.70 - dh;
      const maxY = canvas.height - dh;
      if (c.y < minY) { c.y = minY; c.vy = Math.abs(c.vy); }
      if (c.y > maxY) { c.y = maxY; c.vy = -Math.abs(c.vy); }

      // Animation: pick the best sheet for the current state
      c.animation = pickAnimationKey(c);

      // v3.1.55: Update facing direction based on actual velocity
      // AFTER all bounces. From desktop src/js/pixel-arena.js
      // lines 866-878. pickState() sets an initial direction, but
      // the bounce code flips velocity without updating direction.
      // If we computed facing from the pre-bounce vx/vy, the
      // sprite would be moonwalking along the wall. This code
      // re-derives facing from the dominant velocity axis AFTER
      // the bounce, so the sprite always faces the way it's
      // actually moving.
      //
      // Threshold: prefer left/right (side sprites look better
      // for diagonal movement). Only use up/down when vertical
      // is clearly dominant (>2x horizontal).
      const amx = Math.abs(c.vx);
      const amy = Math.abs(c.vy);
      if (amx > 0.002 || amy > 0.002) {
        if (amy > amx * 2.0) {
          c.direction = c.vy > 0 ? 0 : 1;  // down : up
        } else {
          c.direction = c.vx < 0 ? 2 : 3;  // left : right
        }
      }

      // Advance frame
      const animData = c.images[c.animation];
      if (animData) {
        c.frameTimer += dt;
        if (c.frameTimer >= animData.frameInterval) {
          c.frameTimer = 0;
          c.frame = (c.frame + 1) % animData.frames;
        }
      }
    }
  }

  // v3.1.43: pick the animation SHEET NAME to display. If the
  // state is 'walk' but the walk sheet failed to load, fall back
  // to run, then to idle. This ensures the companion ALWAYS has
  // a visible animation matching its direction.
  function pickAnimationKey(c) {
    if (c.images[c.state]) return c.state;
    if (c.state === 'run' && c.images['walk']) return 'walk';
    if (c.state === 'walk' && c.images['run']) return 'run';
    if (c.images['walk']) return 'walk';
    if (c.images['idle']) return 'idle';
    for (const k of Object.keys(c.images)) return k;
    return 'idle';
  }

  // ── Background ───────────────────────────────────────
  let bgImage = null;
  let currentBgId = 'forest';
  const BACKGROUNDS_BASE = 'file:///android_asset/backgrounds/';

  // v3.1.50: ?mode=wake query param. When set, the arena renders
  // without the forest background — just the companion on a solid
  // black canvas. Used by WakeModeScreen so the wake mode has a
  // distinct visual identity (boar on black) instead of inheriting
  // the home screen's forest backdrop. Companion movement, sprite
  // drawing, name label — all the same. Just no background image.
  const WAKE_MODE = /[?&]mode=wake\b/.test(location.search);

  function loadBackground(id) {
    const file = id === 'meadow' ? 'pixel_landscape_1.png'
              : id === 'grove'  ? 'pixel_landscape_3.png'
              : 'pixel_landscape_2.png';
    currentBgId = id;
    bgImage = null;
    if (WAKE_MODE) {
      // Skip background load in wake mode — drawBackground() uses
      // the solid black fallback instead.
      return;
    }
    const img = new Image();
    img.onload = () => { bgImage = img; notifyRN({ type: 'arena_bg_loaded', id }); };
    img.onerror = () => { notifyRN({ type: 'arena_bg_load_failed', id }); };
    img.src = BACKGROUNDS_BASE + file;
  }

  function setBackground(id) {
    if (typeof id !== 'string') return;
    loadBackground(id);
  }

  function drawBackground() {
    const w = canvas.width, h = canvas.height;
    if (WAKE_MODE) {
      // Wake mode: solid black background. The WebView is wrapped
      // by the WakeModeScreen's black container too, so the canvas
      // blends seamlessly with the rest of the wake UI.
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, w, h);
      return;
    }
    if (bgImage && bgImage.complete && bgImage.naturalWidth > 0) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(bgImage, 0, 0, w, h);
      return;
    }
    // Fallback
    ctx.fillStyle = '#1a1a4a';
    ctx.fillRect(0, 0, w, h);
  }

  // ── Draw ─────────────────────────────────────────────
  function drawShadow(c) {
    if (!c.shadow || !c.shadow.complete) return;
    const [fw, fh] = c.data.frameSize;
    const sw = fw * c.scale * 1.2;
    const sh = sw * 0.25;
    const sx = c.x + (fw * c.scale - sw) / 2;
    const sy = c.y + fh * c.scale - sh * 0.3;
    ctx.globalAlpha = 0.35;
    ctx.drawImage(c.shadow, sx, sy, sw, sh);
    ctx.globalAlpha = 1;
  }

  function drawCompanion(c) {
    const animData = c.images[c.animation];
    if (!animData) return;
    const [fw, fh] = c.data.frameSize;
    const dw = fw * c.scale;
    const dh = fh * c.scale;
    if (!animData.img || !animData.img.complete) return;
    const cols = animData.cols || animData.frames || 1;
    const rows = animData.rows || 1;
    const col = c.frame % cols;
    const row = Math.min(c.direction, rows - 1);
    const sx = col * fw;
    const sy = row * fh;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(animData.img, sx, sy, fw, fh, c.x, c.y, dw, dh);
  }

  function drawName(c) {
    if (!c.name) return;
    const [fw, fh] = c.data.frameSize;
    const dw = fw * c.scale;
    // v3.1.49: smaller font (8px) and orange color for both active
    // and inactive companions (was: 10px, active=orange / inactive=#aaa).
    ctx.fillStyle = '#f7931a';
    ctx.font = 'bold 8px "Orbitron", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(c.name, c.x + dw / 2, c.y - 3);
  }

  // v3.1.48: drawDebug removed (overlay turned off per Tobe's request).

  function render() {
    drawBackground();
    for (const c of companions) {
      // v3.1.46: shadows removed (Tobe asked for cleaner look).
      // drawShadow(c);
      drawCompanion(c);
      drawName(c);
    }
    // v3.1.48: drawDebug() call removed.
  }

  function loop(ts) {
    if (!lastFrame) lastFrame = ts;
    const dt = Math.min(ts - lastFrame, 100);
    lastFrame = ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ── Public API ───────────────────────────────────────
  async function setAgents(agents) {
    if (!Array.isArray(agents)) return;
    if (!catalog) return;
    const MAX = 6;
    const list = agents.length > MAX ? agents.slice(0, MAX) : agents;

    // v3.1.51: IDEMPOTENT. The desktop sends `agents_list` periodically
    // (every reconnect, every desktop change, etc). Previously every
    // setAgents call rebuilt the companions array from scratch and
    // called layout(), which teleported existing companions back to
    // their starting positions. Tobe reported "companions reset to
    // the starting point after 30 sec" — this is why.
    //
    // Now: compare the new list to the current companions. If the IDs
    // match (same companions, just a refresh), keep the existing
    // companion objects (preserving position, animation, state) and
    // just update metadata (scale, name, sprite). Only call layout()
    // if the list actually changed (new IDs, removed IDs).
    const newIds = list.map(a => a.id).sort().join(',');
    const oldIds = companions.map(c => c.id).sort().join(',');
    const sameSet = newIds === oldIds;

    if (sameSet && companions.length > 0) {
      // Same companions — just update metadata in place, no rebuild,
      // no layout() call. Preserves positions and state.
      for (let i = 0; i < list.length && i < companions.length; i++) {
        const a = list[i];
        const c = companions[i];
        if (c.id !== a.id) continue;
        c.name = a.name || c.name;
        c.scale = (typeof a.scale === 'number' && a.scale >= 1 && a.scale <= 8) ? a.scale : c.scale;
        c.isActive = (c.id === activeId);
      }
      return;
    }

    // Different set of companions — full rebuild
    notifyRN({ type: 'arena_set_agents_start', count: list.length });
    let built;
    try {
      built = await Promise.all(list.map(buildCompanion));
    } catch (e) {
      setStatus('setAgents build failed: ' + (e && e.message || e), 'error');
      notifyRN({ type: 'arena_set_agents_failed', error: String(e) });
      return;
    }
    companions = built.filter(Boolean);
    for (const c of companions) c.isActive = (c.id === activeId);
    layout();
    notifyRN({
      type: 'arena_set_agents',
      count: companions.length,
      details: companions.map(c => ({
        id: c.id, name: c.name, scale: c.scale,
        // v3.1.43: report which animations loaded
        anims: c.loadResults,
        canvasW: canvas.width, canvasH: canvas.height,
      })),
    });
  }

  function setActive(id) {
    activeId = id || null;
    for (const c of companions) c.isActive = (c.id === activeId);
  }

  function notifyRN(payload) {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      try { window.ReactNativeWebView.postMessage(JSON.stringify(payload)); } catch (_) {}
    }
  }

  window.Arena = {
    setAgents,
    setActive,
    setBackground,
    init,
    getActiveId: () => activeId,
    getCompanionCount: () => companions.length,
    getBackground: () => currentBgId,
    getDebug: () => ({
      canvasW: canvas.width,
      canvasH: canvas.height,
      windowInnerH: window.innerHeight,
      explicitW: explicitCanvasW,
      explicitH: explicitCanvasH,
      companions: companions.map(c => ({
        id: c.id, state: c.state, animation: c.animation,
        scale: c.scale, vx: c.vx, x: c.x, y: c.y,
        anims: c.loadResults,
      })),
    }),
  };

  // ── Boot ─────────────────────────────────────────────
  window.addEventListener('resize', resize);
  resize();
  loadCatalog();
  loadBackground('forest');

  // v3.1.51: read ?companion=<id> from the URL. WakeModeScreen uses
  // this to set the active companion without needing to call
  // setAgents (which would require sending the full agent list from
  // React Native). If the param is missing or invalid, the
  // companion ID stays null and the WebView waits for a setAgents
  // call from RN (the home screen's normal path).
  try {
    const m = location.search.match(/[?&]companion=([^&]+)/);
    if (m) activeId = decodeURIComponent(m[1]);
  } catch (_) {}

  // v3.1.51: read ?mode=wake and add the wake-mode class to body
  // (moved here from the WAKE_MODE flag init so the class is set
  // before the first render).
  if (WAKE_MODE) document.body.classList.add('wake-mode');

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
