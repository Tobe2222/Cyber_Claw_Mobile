<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta charset="utf-8">
<title>CyberClaw Mobile Arena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:#0a0a2e;
  overflow:hidden;
  width:100vw;height:100vh;
  touch-action:none;
  font-family:'Orbitron',monospace;
}
canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  z-index:1;
}
#status{
  position:absolute;top:8px;left:0;right:0;
  text-align:center;
  color:#888;font-size:11px;
  z-index:10;pointer-events:none;
  letter-spacing:1px;
  text-transform:uppercase;
}
#status.error{color:#f7931a}
#status.ok{color:#4ade80}
</style>
</head>
<body>
<canvas id="arena"></canvas>
<div id="status">Loading arena…</div>
<script>
'use strict';

// ── CyberClaw Mobile Arena (v3.1.31) ───────────────────────────────────────
//
// Multi-companion pixel sprite arena for the mobile companion app.
// This is a STRIPPED-DOWN port of the desktop's pixel-arena.js:
//
//   * No click handlers, no drag, no focus effects.
//   * No toys, no treats, no speech bubbles.
//   * No "add/remove" — the React Native side rebuilds the WebView's
//     companion list by calling the public setAgents() / setActive() API
//     and the WebView re-renders from scratch (we wipe and rebuild on
//     each setAgents call; cheaper than diff-and-update for this scale).
//
// What we DO have:
//   * Sprite loading from the bundled assets folder (catalog.json + per-
//     companion PNG folders).
//   * Per-companion idle animation (other animations could be triggered
//     in the future but aren't needed for the read-only mirror).
//   * Spread layout (evenly placed across the canvas width).
//   * Active companion marker — the active chat companion is drawn with
//     a subtle golden ring underneath + a "speaking" indicator (a small
//     pulsing dot in the corner). Inactive companions get a faint grey
//     ring.
//   * Set on the arena via the message API:
//        window.postMessage({ type: 'setAgents', agents: [...] }, '*');
//        window.postMessage({ type: 'setActive', id: 'clawsuu' }, '*');
//   * Loaded assets are emitted back so the React Native side can
//     report the load state in the Log tab.
//
(function() {
  const canvas = document.getElementById('arena');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');

  // ── State ────────────────────────────────────────────────────────────
  let catalog = null;            // { companions: [{ id, name, folder, frameSize, animations, shadow }] }
  let companions = [];           // [{ id, name, data, images, x, y, scale, frame, frameTimer, frameSpeed, isActive }]
  let activeId = null;
  let assetsBase = 'companions/'; // WebView serves from android_asset root
  let loadFailed = false;
  let lastFrame = 0;

  // ── Status reporting ───────────────────────────────────────────────
  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || '';
  }

  // ── Asset loading ──────────────────────────────────────────────────
  async function loadCatalog() {
    const url = assetsBase + 'catalog.json';
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const j = await r.json();
      if (!j || !Array.isArray(j.companions)) throw new Error('bad catalog shape');
      catalog = j;
      setStatus('Arena ready', 'ok');
      notifyRN({ type: 'arena_loaded', count: catalog.companions.length });
    } catch (e) {
      loadFailed = true;
      setStatus('Failed to load sprite catalog: ' + e.message, 'error');
      notifyRN({ type: 'arena_load_failed', error: String(e.message) });
    }
  }

  function loadImage(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null); // don't crash on missing anims
      img.src = url;
    });
  }

  async function buildCompanion(agent) {
    const pixelId = agent.sprite;
    if (!pixelId) return null;
    const compData = catalog.companions.find(c => c.id === pixelId);
    if (!compData) {
      // Unknown sprite id — fall back to first catalog entry so we
      // always show something rather than a blank slot.
      const fallback = catalog.companions[0];
      if (!fallback) return null;
      return buildCompanion({ ...agent, sprite: fallback.id });
    }
    const images = {};
    // Load the animations we'll actually use. Idle is the default
    // for the read-only mirror. Walk is loaded so we can use it as
    // a "this is the active one" cue if we want later. Death frames
    // can stand in for sleep if we ever want it.
    const animsToLoad = ['idle'];
    for (const name of animsToLoad) {
      const animData = compData.animations[name];
      if (!animData) continue;
      const imgUrl = assetsBase + compData.folder + '/' + animData.file;
      const img = await loadImage(imgUrl);
      if (img) {
        images[name] = { img, frames: animData.frames, cols: animData.cols || animData.frames };
      }
    }
    // Try to load shadow too
    let shadowImg = null;
    if (compData.shadow) {
      shadowImg = await loadImage(assetsBase + compData.folder + '/' + compData.shadow);
    }
    const scale = (typeof agent.scale === 'number' && agent.scale >= 1 && agent.scale <= 8) ? agent.scale : 4;
    return {
      id: agent.id,
      name: agent.name || 'Companion',
      data: compData,
      images,
      shadow: shadowImg,
      scale,
      frame: 0,
      frameTimer: 0,
      frameSpeed: 200,
      isActive: false,
    };
  }

  // ── Layout ──────────────────────────────────────────────────────────
  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
    layout();
  }

  function layout() {
    const n = companions.length;
    if (!n) return;
    const w = canvas.width;
    const h = canvas.height;
    // Place all companions on the same horizontal row, centered
    // vertically below the horizon. Spread evenly across the width.
    const groundY = h * 0.7;
    for (let i = 0; i < n; i++) {
      const c = companions[i];
      const fw = (c.data.frameSize[0] || 32) * c.scale;
      const x = w * (i + 1) / (n + 1) - fw / 2;
      c.x = x;
      c.y = groundY;
    }
  }

  // ── Update + Draw ──────────────────────────────────────────────────
  function update(dt) {
    const now = performance.now();
    for (const c of companions) {
      const animData = c.images['idle'];
      if (!animData) continue;
      c.frameTimer += dt;
      if (c.frameTimer >= c.frameSpeed) {
        c.frameTimer = 0;
        c.frame = (c.frame + 1) % animData.frames;
      }
    }
    lastFrame = now;
  }

  function drawBackground() {
    // Solid dark blue background + simple horizon gradient
    const w = canvas.width;
    const h = canvas.height;
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.5, '#1a1a4a');
    grad.addColorStop(1, '#0a1a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Ground band
    const groundY = h * 0.7;
    const groundGrad = ctx.createLinearGradient(0, groundY, 0, h);
    groundGrad.addColorStop(0, '#1a2a1a');
    groundGrad.addColorStop(1, '#0a1a0a');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, groundY, w, h - groundY);

    // Horizon line
    ctx.fillStyle = '#f7931a';
    ctx.fillRect(0, groundY, w, 1);
  }

  function drawShadow(c) {
    if (!c.shadow || !c.shadow.complete) return;
    const [fw, fh] = c.data.frameSize;
    const sw = fw * c.scale * 1.2;
    const sh = sw * 0.25;
    const sx = c.x + (fw * c.scale - sw) / 2;
    const sy = c.y + fh * c.scale - sh * 0.3;
    ctx.globalAlpha = 0.35;
    ctx.drawImage(c.shadow, sx, sy, sw, sh);
    ctx.globalAlpha = 1;
  }

  function drawRing(c) {
    const [fw, fh] = c.data.frameSize;
    const dw = fw * c.scale;
    const dh = fh * c.scale;
    const cx = c.x + dw / 2;
    const cy = c.y + dh / 2;
    const r = Math.max(dw, dh) * 0.6;
    if (c.isActive) {
      // Active: bright golden ring with a slow pulse
      const t = (Math.sin(lastFrame * 0.003) + 1) * 0.5; // 0..1
      ctx.strokeStyle = '#f7931a';
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.5 + t * 0.4;
      ctx.beginPath();
      ctx.ellipse(cx, cy + dh * 0.2, r * 1.05, r * 0.35, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else {
      // Inactive: faint grey ring
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.ellipse(cx, cy + dh * 0.2, r * 1.0, r * 0.33, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawCompanion(c) {
    const animData = c.images['idle'];
    if (!animData || !animData.img || !animData.img.complete) return;
    const [fw, fh] = c.data.frameSize;
    const cols = animData.cols;
    const col = c.frame % cols;
    const sx = col * fw;
    const sy = 0; // idle anim is on row 0
    const dw = fw * c.scale;
    const dh = fh * c.scale;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(animData.img, sx, sy, fw, fh, c.x, c.y, dw, dh);
  }

  function drawName(c) {
    if (!c.name) return;
    const [fw, fh] = c.data.frameSize;
    const dw = fw * c.scale;
    ctx.fillStyle = c.isActive ? '#f7931a' : '#888';
    ctx.font = 'bold 11px "Orbitron", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(c.name, c.x + dw / 2, c.y - 8);
  }

  function render() {
    drawBackground();
    for (const c of companions) {
      drawShadow(c);
      drawRing(c);
      drawCompanion(c);
      drawName(c);
    }
  }

  function loop(ts) {
    if (!lastFrame) lastFrame = ts;
    const dt = ts - lastFrame;
    lastFrame = ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ── Public API (called from React Native) ──────────────────────────
  async function setAgents(agents) {
    if (!Array.isArray(agents)) return;
    if (!catalog) {
      // Catalog not loaded yet — wait a moment and retry
      await new Promise(r => setTimeout(r, 200));
      if (!catalog) return;
    }
    // Cap to MAX_MOBILE_COMPANIONS — but the desktop already caps
    // before sending, so this is belt-and-braces. If a future
    // desktop regression lets more through, the mobile still
    // shows only 6 instead of crashing or wrapping.
    const MAX = 6;
    const list = agents.length > MAX ? agents.slice(0, MAX) : agents;
    // Build all companions in parallel
    const built = await Promise.all(list.map(buildCompanion));
    companions = built.filter(Boolean);
    // Restore active state
    for (const c of companions) c.isActive = (c.id === activeId);
    layout();
    notifyRN({ type: 'arena_set_agents', count: companions.length });
  }

  function setActive(id) {
    activeId = id || null;
    for (const c of companions) c.isActive = (c.id === activeId);
  }

  // Expose API on window for React Native's injectJavaScript to call.
  window.Arena = {
    setAgents,
    setActive,
    getActiveId: () => activeId,
    getCompanionCount: () => companions.length,
  };

  // ── React Native bridge ────────────────────────────────────────────
  function notifyRN(payload) {
    // The React Native side listens for 'message' events on the
    // WebView. Wrap in a JSON-encoded string so the receiver can
    // JSON.parse it directly.
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      try { window.ReactNativeWebView.postMessage(JSON.stringify(payload)); } catch (_) {}
    }
  }

  // React Native injects messages via:
  //   window.dispatchEvent(new MessageEvent('message', { data: JSON.stringify({...}) }));
  // so we listen on window for that. Also support direct window.Arena
  // calls via injectJavaScript.
  window.addEventListener('message', (e) => {
    let msg = e.data;
    if (typeof msg === 'string') {
      try { msg = JSON.parse(msg); } catch (_) { return; }
    }
    if (!msg || !msg.type) return;
    if (msg.type === 'setAgents') {
      setAgents(msg.agents);
    } else if (msg.type === 'setActive') {
      setActive(msg.id);
    }
  });

  // ── Boot ────────────────────────────────────────────────────────────
  window.addEventListener('resize', resize);
  resize();
  loadCatalog().then(() => {
    if (catalog) {
      // Auto-start the loop; it just draws the background if no
      // companions have been set yet.
      requestAnimationFrame(loop);
    }
  });
})();
</script>
</body>
</html>
