<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta charset="utf-8">
<title>CyberClaw Mobile Arena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:#0a0a2e;
  overflow:hidden;
  width:100vw;height:100vh;
  touch-action:none;
  font-family:'Orbitron',monospace;
}
canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  z-index:1;
}
#status{
  position:absolute;top:8px;left:0;right:0;
  text-align:center;
  color:#888;font-size:11px;
  z-index:10;pointer-events:none;
  letter-spacing:1px;
  text-transform:uppercase;
}
#status.error{color:#f7931a}
#status.ok{color:#4ade80}
</style>
</head>
<body>
<canvas id="arena"></canvas>
<div id="status">Loading arena…</div>
<script>
'use strict';

// ── CyberClaw Mobile Arena (v3.1.32) ──────────────────────────────
//
// Multi-companion pixel arena for the mobile companion app.
// This is a STRIPPED-DOWN port of the desktop's pixel-arena.js:
//
//   * No click handlers, no drag, no focus effects.
//   * No toys, no treats, no speech bubbles.
//   * No "add/remove" — the React Native side rebuilds the WebView's
//     companion list by calling the public setAgents() / setActive() API
//     and the WebView re-renders from scratch (we wipe and rebuild on
//     each setAgents call; cheaper than diff-and-update at this scale).
//
// What we DO have:
//   * Per-companion idle animation.
//   * Spread layout (evenly placed across the canvas width).
//   * Active companion marker — the active chat companion is drawn with
//     a subtle golden ring underneath + a brighter name. Inactive
//     companions get a faint grey ring.
//   * Set on the arena via the message API:
//        window.postMessage({ type: 'setAgents', agents: [...] }, '*');
//        window.postMessage({ type: 'setActive', id: 'clawsuu' }, '*');
//   * Loaded assets are emitted back so the React Native side can
//     report the load state in the Log tab.
//
// Note on terminology: the user-visible text says "companion" not
// "sprite". Internally we still use "sprite" because that's the
// pixel-arena convention inherited from the desktop (each companion
// is drawn from a pixel-art framesheet). User never sees "sprite".
//
(function() {
  const canvas = document.getElementById('arena');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');

  // ── State ────────────────────────────────────────────
  let catalog = null;
  let companions = [];
  let activeId = null;
  let assetsBase = 'file:///android_asset/companions/';
  let lastFrame = 0;

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || '';
  }

  // v3.1.33: catch any uncaught error and show it in the status
  // bar. Without this, a single bad line (e.g. an unsupported
  // API) would leave the user stuck on "Loading arena..." with
  // no clue why. This at least surfaces the error message so
  // we can debug from screenshots alone.
  window.addEventListener('error', (ev) => {
    const msg = (ev && (ev.message || (ev.error && ev.error.message))) || 'unknown error';
    const where = (ev && ev.filename) ? ` (${ev.filename}:${ev.lineno})` : '';
    setStatus('JS error: ' + msg + where, 'error');
    try { notifyRN({ type: 'arena_js_error', message: msg, where: where }); } catch (_) {}
  });
  window.addEventListener('unhandledrejection', (ev) => {
    const r = ev && ev.reason;
    const msg = (r && r.message) || String(r) || 'unhandled rejection';
    setStatus('Promise error: ' + msg, 'error');
    try { notifyRN({ type: 'arena_promise_error', message: msg }); } catch (_) {}
  });

  // ── Embedded companion catalog ───────────────────────────────
  // v3.1.32: the catalog is EMBEDDED in this script (below) as a
  // JS const, not fetched. Android WebView's fetch() refuses to
  // load file:// URLs from a non-secure origin (a known WebView
  // restriction), so trying to fetch catalog.json gave us
  // "FAILED TO FETCH". Inlining the catalog is the fix: the catalog
  // is small (~5 KB) and rarely changes. The actual sprite images
  // still load via `new Image(); img.src = 'file:///android_asset/...'`
  // which is allowed (only fetch() / XHR is restricted).
  //
  // To regenerate: see tools/build_embedded_catalog.py in the
  // mobile repo. Run it after editing assets/companions/catalog.json.
  const EMBEDDED_CATALOG = {
  "companions": [
    {
      "id": "fox",
      "name": "Fox",
      "folder": "Fox",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Fox_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Fox_walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "run": {
          "file": "Fox_Run.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Fox_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Fox_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Fox_Shadow.png"
    },
    {
      "id": "boar",
      "name": "Boar",
      "folder": "Boar",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Boar_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Boar_Walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "run": {
          "file": "Boar_Run.png",
          "cols": 5,
          "rows": 4,
          "frames": 5,
          "speed": 10
        },
        "attack": {
          "file": "Boar_Attack.png",
          "cols": 5,
          "rows": 4,
          "frames": 5,
          "speed": 8
        },
        "hurt": {
          "file": "Boar_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Boar_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Boar_shadow.png"
    },
    {
      "id": "deer",
      "name": "Deer",
      "folder": "Deer",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Deer_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Deer_Walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "run": {
          "file": "Deer_Run.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Deer_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Deer_Death.png",
          "cols": 7,
          "rows": 4,
          "frames": 7,
          "speed": 6
        }
      },
      "shadow": "Deer_Shadow.png"
    },
    {
      "id": "hare",
      "name": "Hare",
      "folder": "Hare",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Hare_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Hare_Walk.png",
          "cols": 5,
          "rows": 4,
          "frames": 5,
          "speed": 8
        },
        "run": {
          "file": "Hare_Run.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Hare_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Hare_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Hare_Shadow.png"
    },
    {
      "id": "black_grouse",
      "name": "Black Grouse",
      "folder": "Black_grouse",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Black_grouse_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Black_grouse_Walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "flight": {
          "file": "Black_grouse_Flight.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Black_grouse_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Black_grouse_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Black_grouse_Shadow.png"
    }
  ]
};

  function loadCatalog() {
    catalog = EMBEDDED_CATALOG;
    if (!catalog || !Array.isArray(catalog.companions)) {
      setStatus('Failed to load companion catalog: bad shape', 'error');
      notifyRN({ type: 'arena_load_failed', error: 'bad catalog shape' });
      return;
    }
    setStatus('Arena ready', 'ok');
    notifyRN({ type: 'arena_loaded', count: catalog.companions.length });
  }

  function loadImage(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }

  async function buildCompanion(agent) {
    const pixelId = agent.sprite;
    if (!pixelId) return null;
    const compData = catalog.companions.find(c => c.id === pixelId);
    if (!compData) {
      const fallback = catalog.companions[0];
      if (!fallback) return null;
      return buildCompanion({ ...agent, sprite: fallback.id });
    }
    const images = {};
    const animsToLoad = ['idle'];
    for (const name of animsToLoad) {
      const animData = compData.animations[name];
      if (!animData) continue;
      const imgUrl = assetsBase + compData.folder + '/' + animData.file;
      const img = await loadImage(imgUrl);
      if (img) {
        images[name] = { img, frames: animData.frames, cols: animData.cols || animData.frames };
      }
    }
    let shadowImg = null;
    if (compData.shadow) {
      shadowImg = await loadImage(assetsBase + compData.folder + '/' + compData.shadow);
    }
    const scale = (typeof agent.scale === 'number' && agent.scale >= 1 && agent.scale <= 8) ? agent.scale : 4;
    return {
      id: agent.id,
      name: agent.name || 'Companion',
      data: compData,
      images,
      shadow: shadowImg,
      scale,
      frame: 0,
      frameTimer: 0,
      frameSpeed: 200,
      isActive: false,
    };
  }

  // ── Layout ────────────────────────────────────────────
  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
    layout();
  }

  function layout() {
    const n = companions.length;
    if (!n) return;
    const w = canvas.width;
    const h = canvas.height;
    const groundY = h * 0.7;
    for (let i = 0; i < n; i++) {
      const c = companions[i];
      const fw = (c.data.frameSize[0] || 32) * c.scale;
      const x = w * (i + 1) / (n + 1) - fw / 2;
      c.x = x;
      c.y = groundY;
    }
  }

  // ── Update + Draw ────────────────────────────────────
  function update(dt) {
    const now = performance.now();
    for (const c of companions) {
      const animData = c.images['idle'];
      if (!animData) continue;
      c.frameTimer += dt;
      if (c.frameTimer >= c.frameSpeed) {
        c.frameTimer = 0;
        c.frame = (c.frame + 1) % animData.frames;
      }
    }
    lastFrame = now;
  }

  function drawBackground() {
    const w = canvas.width;
    const h = canvas.height;
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(0.5, '#1a1a4a');
    grad.addColorStop(1, '#0a1a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    const groundY = h * 0.7;
    const groundGrad = ctx.createLinearGradient(0, groundY, 0, h);
    groundGrad.addColorStop(0, '#1a2a1a');
    groundGrad.addColorStop(1, '#0a1a0a');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, groundY, w, h - groundY);

    ctx.fillStyle = '#f7931a';
    ctx.fillRect(0, groundY, w, 1);
  }

  function drawShadow(c) {
    if (!c.shadow || !c.shadow.complete) return;
    const [fw, fh] = c.data.frameSize;
    const sw = fw * c.scale * 1.2;
    const sh = sw * 0.25;
    const sx = c.x + (fw * c.scale - sw) / 2;
    const sy = c.y + fh * c.scale - sh * 0.3;
    ctx.globalAlpha = 0.35;
    ctx.drawImage(c.shadow, sx, sy, sw, sh);
    ctx.globalAlpha = 1;
  }

  function drawRing(c) {
    const [fw, fh] = c.data.frameSize;
    const dw = fw * c.scale;
    const dh = fh * c.scale;
    const cx = c.x + dw / 2;
    const cy = c.y + dh / 2;
    const r = Math.max(dw, dh) * 0.6;
    if (c.isActive) {
      const t = (Math.sin(lastFrame * 0.003) + 1) * 0.5;
      ctx.strokeStyle = '#f7931a';
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.5 + t * 0.4;
      ctx.beginPath();
      ctx.ellipse(cx, cy + dh * 0.2, r * 1.05, r * 0.35, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else {
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.ellipse(cx, cy + dh * 0.2, r * 1.0, r * 0.33, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawCompanion(c) {
    const animData = c.images['idle'];
    if (!animData || !animData.img || !animData.img.complete) return;
    const [fw, fh] = c.data.frameSize;
    const cols = animData.cols;
    const col = c.frame % cols;
    const sx = col * fw;
    const sy = 0;
    const dw = fw * c.scale;
    const dh = fh * c.scale;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(animData.img, sx, sy, fw, fh, c.x, c.y, dw, dh);
  }

  function drawName(c) {
    if (!c.name) return;
    const [fw, fh] = c.data.frameSize;
    const dw = fw * c.scale;
    ctx.fillStyle = c.isActive ? '#f7931a' : '#888';
    ctx.font = 'bold 11px "Orbitron", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(c.name, c.x + dw / 2, c.y - 8);
  }

  function render() {
    drawBackground();
    for (const c of companions) {
      drawShadow(c);
      drawRing(c);
      drawCompanion(c);
      drawName(c);
    }
  }

  function loop(ts) {
    if (!lastFrame) lastFrame = ts;
    const dt = ts - lastFrame;
    lastFrame = ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ── Public API (called from React Native) ──────────────────
  async function setAgents(agents) {
    if (!Array.isArray(agents)) return;
    if (!catalog) return;
    // Cap to MAX_MOBILE_COMPANIONS — the desktop already caps
    // before sending, but if a future desktop regression lets
    // more through, the mobile still shows only 6.
    const MAX = 6;
    const list = agents.length > MAX ? agents.slice(0, MAX) : agents;
    const built = await Promise.all(list.map(buildCompanion));
    companions = built.filter(Boolean);
    for (const c of companions) c.isActive = (c.id === activeId);
    layout();
    notifyRN({ type: 'arena_set_agents', count: companions.length });
  }

  function setActive(id) {
    activeId = id || null;
    for (const c of companions) c.isActive = (c.id === activeId);
  }

  window.Arena = {
    setAgents,
    setActive,
    getActiveId: () => activeId,
    getCompanionCount: () => companions.length,
  };

  // ── React Native bridge ──────────────────────────────
  function notifyRN(payload) {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      try { window.ReactNativeWebView.postMessage(JSON.stringify(payload)); } catch (_) {}
    }
  }

  window.addEventListener('message', (e) => {
    let msg = e.data;
    if (typeof msg === 'string') {
      try { msg = JSON.parse(msg); } catch (_) { return; }
    }
    if (!msg || !msg.type) return;
    if (msg.type === 'setAgents') {
      setAgents(msg.agents);
    } else if (msg.type === 'setActive') {
      setActive(msg.id);
    }
  });

  // ── Boot ────────────────────────────────────────────
  window.addEventListener('resize', resize);
  resize();
  loadCatalog();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
