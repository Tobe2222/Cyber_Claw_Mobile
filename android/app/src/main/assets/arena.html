<html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a2e; overflow:hidden; width:100vw; height:100vh; }
    canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
    /* Top-left: bg + companion change buttons */
    #btnLeft {
      position:absolute; top:6px; left:6px;
      display:flex; gap:5px; pointer-events:all;
    }
    /* Top-right: fullscreen only */
    #btnRight {
      position:absolute; top:6px; right:6px;
      display:flex; gap:5px; pointer-events:all;
    }
    /* Fullscreen overlay controls */
    #fsControls {
      position:absolute; top:6px; right:6px;
      display:none; gap:5px; pointer-events:all;
    }
    body.fullscreen #btnLeft,
    body.fullscreen #btnRight { display:none; }
    body.fullscreen #fsControls { display:flex; }
    .btn {
      background:rgba(0,0,0,0.6); border:1px solid rgba(247,147,26,0.35);
      color:#f7931a; font-size:14px; width:28px; height:28px;
      border-radius:6px; cursor:pointer; display:flex;
      align-items:center; justify-content:center;
    }
    .btn:active { background:rgba(247,147,26,0.2); }
    #thinking {
      position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.75); color:#f7931a;
      font-family:monospace; font-size:11px;
      padding:4px 12px; border-radius:10px; display:none; white-space:nowrap;
    }
    #thinking.on { display:block; }
  </style>

// Spritesheet rows: row 2 = faces right, row 3 = faces left
// Walk: 192x128, 6 cols x 4 rows => 32x32 per frame
// Idle: 128x128, 4 cols x 4 rows => 32x32 per frame
const ANIMS = {
  walk: { key:'fox_walk', cols:6, frames:6, speed:7, rowRight:2, rowLeft:3 },
  idle: { key:'fox_idle', cols:4, frames:4, speed:9, rowRight:2, rowLeft:2 },
};

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const imgs = {};
Object.entries(ASSETS).forEach(([k,src]) => {
  const i = new Image(); i.src = src; imgs[k] = i;
});

let zoomed = false;
let showBg = true;
let fullscreen = false;
let frameCount = 0;

window.__setZoomed = v => { zoomed = v; };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

const comp = {
  x: 80, vx: 0.7,
  dir: 1,  // 1=right, -1=left
  anim: 'walk',
  frame: 0, frameTimer: 0,
  scale: 3,
};

function groundY() {
  const def = ANIMS[comp.anim] || ANIMS.walk;
  const img = imgs[def.key];
  const fh = (img && img.naturalHeight) ? img.naturalHeight / 4 : 32;
  return canvas.height * 0.68 - fh * comp.scale;
}

function drawBg() {
  if (!showBg) {
    ctx.fillStyle = '#0a0a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    return;
  }
  if (imgs.bg && imgs.bg.complete && imgs.bg.naturalWidth) {
    ctx.drawImage(imgs.bg, 0, 0, canvas.width, canvas.height);
  } else {
    const h = canvas.height, horizon = h * 0.55;
    const sky = ctx.createLinearGradient(0,0,0,horizon);
    sky.addColorStop(0,'#0a0a2e'); sky.addColorStop(1,'#1a1a4e');
    ctx.fillStyle = sky; ctx.fillRect(0,0,canvas.width,horizon);
    const grd = ctx.createLinearGradient(0,horizon,0,h);
    grd.addColorStop(0,'#1a3a1a'); grd.addColorStop(1,'#0d1f0d');
    ctx.fillStyle = grd; ctx.fillRect(0,horizon,canvas.width,h-horizon);
  }
}

function drawComp() {
  const def = ANIMS[comp.anim] || ANIMS.walk;
  const img = imgs[def.key];
  if (!img || !img.complete || !img.naturalWidth) {
    ctx.fillStyle = '#f7931a';
    const y = groundY();
    ctx.beginPath(); ctx.arc(comp.x, y+16, 16, 0, Math.PI*2); ctx.fill();
    return;
  }

  comp.frameTimer++;
  if (comp.frameTimer >= def.speed) {
    comp.frame = (comp.frame + 1) % def.frames;
    comp.frameTimer = 0;
  }

  const fw = img.naturalWidth / def.cols;
  const fh = img.naturalHeight / 4;
  // Choose row based on direction — no canvas flip needed
  const row = comp.dir >= 0 ? def.rowRight : def.rowLeft;
  const sx = comp.frame * fw, sy = row * fh;
  const scale = zoomed ? comp.scale * 4 : comp.scale;
  const dw = fw * scale, dh = fh * scale;

  let drawX, drawY;
  if (zoomed) {
    // Center companion on screen
    drawX = canvas.width/2 - dw/2;
    drawY = canvas.height/2 - dh/2;
  } else {
    drawX = comp.x - dw/2;
    drawY = groundY();
  }

  // Shadow first (under sprite) — only in non-zoomed
  if (!zoomed) {
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.ellipse(comp.x, drawY + dh + 3, dw*0.38, 5, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // Sprite
  ctx.drawImage(img, sx, sy, fw, fh, drawX, drawY, dw, dh);
}

function update() {
  if (comp.anim !== 'idle' && !zoomed) {
    comp.x += comp.vx * comp.dir;
    if (comp.x > canvas.width - 50) comp.dir = -1;
    if (comp.x < 50) comp.dir = 1;
  }
  if (Math.random() < 0.0015 && comp.anim === 'walk') {
    comp.anim = 'idle'; comp.frame = 0;
    setTimeout(() => { comp.anim = 'walk'; comp.frame = 0; }, 1500 + Math.random()*2000);
  }
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBg();
  drawComp();
  update();
  frameCount++;
  requestAnimationFrame(loop);
}
loop();

// Button handlers
document.getElementById('fsBtn').addEventListener('click', () => {
  window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({type:'fullscreen'}));
});
document.getElementById('bgBtn').addEventListener('click', () => {
  window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({type:'changeBg'}));
});
document.getElementById('compBtn').addEventListener('click', () => {
  window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({type:'changeComp'}));
});
document.getElementById('zoomBtn').addEventListener('click', () => {
  zoomed = !zoomed;
  showBg = !zoomed; // remove background when zoomed
});
document.getElementById('exitBtn').addEventListener('click', () => {
  window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({type:'exitFullscreen'}));
});

// Messages from React Native
function handleMsg(data) {
  try {
    const msg = JSON.parse(data);
    if (msg.type === 'thinking') {
      document.getElementById('thinking').className = msg.active ? 'on' : '';
      comp.anim = msg.active ? 'idle' : 'walk';
      comp.frame = 0;
    }
    if (msg.type === 'setZoomed') { zoomed = msg.value; showBg = !zoomed; }
    if (msg.type === 'setFullscreen') {
      fullscreen = msg.value;
      document.body.className = fullscreen ? 'fullscreen' : '';
      if (fullscreen) { zoomed = true; showBg = false; }
    }
  } catch {}
}
window.addEventListener('message', e => handleMsg(e.data));
document.addEventListener('message', e => handleMsg(e.data));
</script>
