<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta charset="utf-8">
<title>CyberClaw Mobile Arena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:#0a0a2e;
  overflow:hidden;
  width:100vw;height:100vh;
  touch-action:none;
  font-family:'Orbitron',monospace;
}
canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  z-index:1;
}
#status{
  position:absolute;top:8px;left:0;right:0;
  text-align:center;
  color:#888;font-size:11px;
  z-index:10;pointer-events:none;
  letter-spacing:1px;
  text-transform:uppercase;
}
#status.error{color:#f7931a}
#status.ok{color:#4ade80}
</style>
</head>
<body>
<canvas id="arena"></canvas>
<div id="status">Loading arena…</div>
<script>
'use strict';

// ── CyberClaw Mobile Arena (v3.1.32) ──────────────────────────────
//
// Multi-companion pixel arena for the mobile companion app.
// This is a STRIPPED-DOWN port of the desktop's pixel-arena.js:
//
//   * No click handlers, no drag, no focus effects.
//   * No toys, no treats, no speech bubbles.
//   * No "add/remove" — the React Native side rebuilds the WebView's
//     companion list by calling the public setAgents() / setActive() API
//     and the WebView re-renders from scratch (we wipe and rebuild on
//     each setAgents call; cheaper than diff-and-update at this scale).
//
// What we DO have:
//   * Per-companion idle animation.
//   * Spread layout (evenly placed across the canvas width).
//   * Active companion marker — the active chat companion is drawn with
//     a subtle golden ring underneath + a brighter name. Inactive
//     companions get a faint grey ring.
//   * Set on the arena via the message API:
//        window.postMessage({ type: 'setAgents', agents: [...] }, '*');
//        window.postMessage({ type: 'setActive', id: 'clawsuu' }, '*');
//   * Loaded assets are emitted back so the React Native side can
//     report the load state in the Log tab.
//
// Note on terminology: the user-visible text says "companion" not
// "sprite". Internally we still use "sprite" because that's the
// pixel-arena convention inherited from the desktop (each companion
// is drawn from a pixel-art framesheet). User never sees "sprite".
//
(function() {
  const canvas = document.getElementById('arena');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');

  // ── State ────────────────────────────────────────────
  let catalog = null;
  let companions = [];
  let activeId = null;
  let assetsBase = 'file:///android_asset/companions/';
  let lastFrame = 0;

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || '';
  }

  // v3.1.33: catch any uncaught error and show it in the status
  // bar. Without this, a single bad line (e.g. an unsupported
  // API) would leave the user stuck on "Loading arena..." with
  // no clue why. This at least surfaces the error message so
  // we can debug from screenshots alone.
  window.addEventListener('error', (ev) => {
    const msg = (ev && (ev.message || (ev.error && ev.error.message))) || 'unknown error';
    const where = (ev && ev.filename) ? ` (${ev.filename}:${ev.lineno})` : '';
    setStatus('JS error: ' + msg + where, 'error');
    try { notifyRN({ type: 'arena_js_error', message: msg, where: where }); } catch (_) {}
  });
  window.addEventListener('unhandledrejection', (ev) => {
    const r = ev && ev.reason;
    const msg = (r && r.message) || String(r) || 'unhandled rejection';
    setStatus('Promise error: ' + msg, 'error');
    try { notifyRN({ type: 'arena_promise_error', message: msg }); } catch (_) {}
  });

  // ── Embedded companion catalog ───────────────────────────────
  // v3.1.32: the catalog is EMBEDDED in this script (below) as a
  // JS const, not fetched. Android WebView's fetch() refuses to
  // load file:// URLs from a non-secure origin (a known WebView
  // restriction), so trying to fetch catalog.json gave us
  // "FAILED TO FETCH". Inlining the catalog is the fix: the catalog
  // is small (~5 KB) and rarely changes. The actual sprite images
  // still load via `new Image(); img.src = 'file:///android_asset/...'`
  // which is allowed (only fetch() / XHR is restricted).
  //
  // To regenerate: see tools/build_embedded_catalog.py in the
  // mobile repo. Run it after editing assets/companions/catalog.json.
  const EMBEDDED_CATALOG = {
  "companions": [
    {
      "id": "fox",
      "name": "Fox",
      "folder": "Fox",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Fox_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Fox_walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "run": {
          "file": "Fox_Run.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Fox_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Fox_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Fox_Shadow.png"
    },
    {
      "id": "boar",
      "name": "Boar",
      "folder": "Boar",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Boar_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Boar_Walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "run": {
          "file": "Boar_Run.png",
          "cols": 5,
          "rows": 4,
          "frames": 5,
          "speed": 10
        },
        "attack": {
          "file": "Boar_Attack.png",
          "cols": 5,
          "rows": 4,
          "frames": 5,
          "speed": 8
        },
        "hurt": {
          "file": "Boar_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Boar_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Boar_shadow.png"
    },
    {
      "id": "deer",
      "name": "Deer",
      "folder": "Deer",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Deer_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Deer_Walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "run": {
          "file": "Deer_Run.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Deer_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Deer_Death.png",
          "cols": 7,
          "rows": 4,
          "frames": 7,
          "speed": 6
        }
      },
      "shadow": "Deer_Shadow.png"
    },
    {
      "id": "hare",
      "name": "Hare",
      "folder": "Hare",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Hare_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Hare_Walk.png",
          "cols": 5,
          "rows": 4,
          "frames": 5,
          "speed": 8
        },
        "run": {
          "file": "Hare_Run.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Hare_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Hare_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Hare_Shadow.png"
    },
    {
      "id": "black_grouse",
      "name": "Black Grouse",
      "folder": "Black_grouse",
      "frameSize": [
        32,
        32
      ],
      "animations": {
        "idle": {
          "file": "Black_grouse_Idle.png",
          "cols": 4,
          "rows": 4,
          "frames": 4,
          "speed": 6
        },
        "walk": {
          "file": "Black_grouse_Walk.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 8
        },
        "flight": {
          "file": "Black_grouse_Flight.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 10
        },
        "hurt": {
          "file": "Black_grouse_Hurt.png",
          "cols": 4,
          "rows": 4,
          "frames": 2,
          "speed": 6
        },
        "death": {
          "file": "Black_grouse_Death.png",
          "cols": 6,
          "rows": 4,
          "frames": 6,
          "speed": 6
        }
      },
      "shadow": "Black_grouse_Shadow.png"
    }
  ]
};

  function loadCatalog() {
    catalog = EMBEDDED_CATALOG;
    if (!catalog || !Array.isArray(catalog.companions)) {
      setStatus('Failed to load companion catalog: bad shape', 'error');
      notifyRN({ type: 'arena_load_failed', error: 'bad catalog shape' });
      return;
    }
    setStatus('Arena ready', 'ok');
    notifyRN({ type: 'arena_loaded', count: catalog.companions.length });
    // v3.1.40: the "Arena ready" overlay was permanent and sat in
    // the top-left of the canvas. Clear it after 2.5s so it
    // doesn't overlap the action.
    setTimeout(() => {
      if (statusEl.textContent === 'Arena ready') {
        statusEl.textContent = '';
        statusEl.className = '';
      }
    }, 2500);
  }

  function loadImage(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }

  async function buildCompanion(agent) {
    const pixelId = agent.sprite;
    if (!pixelId) return null;
    const compData = catalog.companions.find(c => c.id === pixelId);
    if (!compData) {
      const fallback = catalog.companions[0];
      if (!fallback) return null;
      return buildCompanion({ ...agent, sprite: fallback.id });
    }
    // v3.1.38: load every animation the catalog lists (idle, walk, run,
    // hurt, death, attack). Previously we only loaded 'idle' since the
    // companion was a static bob. Now they need walk + run for the
    // state-machine behaviour to feel alive. Catalog `speed` is frames
    // per second, so frameInterval = 1000/speed ms. If a sheet is
    // missing on disk the loadImage resolves to null and we just skip
    // that animation — the fallback chain in pickAnim() handles the
    // rest.
    const images = {};
    for (const [animName, animData] of Object.entries(compData.animations || {})) {
      if (!animData || !animData.file) continue;
      const img = await loadImage(assetsBase + compData.folder + '/' + animData.file);
      if (!img) continue;
      const speed = (typeof animData.speed === 'number' && animData.speed > 0) ? animData.speed : 6;
      images[animName] = {
        img,
        frames: animData.frames || 1,
        cols: animData.cols || animData.frames || 1,
        rows: animData.rows || 1,
        frameInterval: Math.round(1000 / speed),
      };
    }
    let shadowImg = null;
    if (compData.shadow) {
      shadowImg = await loadImage(assetsBase + compData.folder + '/' + compData.shadow);
    }
    // v3.1.40: mobile default scale dropped from 4 to 2. The
    // desktop's default is 5 (and the desktop canvas is huge), but
    // a scale-4 sprite is 128px tall — taller than half the typical
    // mobile arena viewport — and dominates the screen. Scale 2
    // (= 64px tall) feels right for the small mobile arena. If the
    // desktop sends an explicit scale, we still respect it.
    const scale = (typeof agent.scale === 'number' && agent.scale >= 1 && agent.scale <= 8) ? agent.scale : 2;
    // v3.1.41: stable per-id hash for staggering initial state.
    // Same algorithm as bobFor() so values line up if you change one.
    // (Removed unused initialDirection — we set direction directly
    // in the return block below; the hash is only used for
    // stateTimer staggering.)
    let _h = 0;
    for (let i = 0; i < agent.id.length; i++) _h = (_h * 31 + agent.id.charCodeAt(i)) >>> 0;
    return {
      id: agent.id,
      name: agent.name || 'Companion',
      data: compData,
      images,
      shadow: shadowImg,
      scale,
      // v3.1.38: animation state machine (mirrors the desktop's
      // pixel-arena.js AI). state ∈ {'idle','walk','run','zoomies'};
      // direction is the sprite-sheet row (0=down,1=up,2=left,3=right,
      // matches the desktop convention). stateTimer is ms until we
      // roll a new state. vx/vy are pixels/ms (we use vx only on the
      // mobile — vertical movement is suppressed so companions stay
      // on the ground line; see update()).
      // v3.1.41: start in 'walk' with a LONGER stateTimer so the
      // companion walks for 4-7 seconds before the first
      // pickState. v3.1.40 used 0.3-0.7s which was too short —
      // pickState would roll idle most of the time (30% chance)
      // and the companion would feel static for a few seconds.
      // A 4-7s walk guarantees the user sees movement on load.
      // Direction starts L or R (not 0=down) so the sprite
      // shows the side-view walking animation immediately.
      state: 'walk',
      direction: Math.random() < 0.5 ? 2 : 3, // L or R walking sprite row
      vx: (Math.random() < 0.5 ? -1 : 1) * (0.025 + Math.random() * 0.015), // 0.025-0.040 px/ms
      vy: 0,
      stateTimer: 4000 + (_h % 3000), // 4-7s before first pickState
      frame: 0,
      frameTimer: 0,
      isActive: false,
    };
  }

  // ── Layout ────────────────────────────────────────────
  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
    layout();
  }

  // v3.1.41: ground line. Earlier versions used 0.78 / 0.6 — both
  // were wrong because they tried to use the actual image's grass
  // position. The problem is the Android WebView reports
  // window.innerHeight = the FULL viewport height, not the WebView
  // container's height. So canvas.height is huge (e.g. 800 on a
  // typical phone) but only the top ARENA_HEIGHT portion (~187 CSS
  // px on iPhone mini) is visible. Putting feet at 78% of canvas
  // puts them WAY off-screen below the WebView's bottom border.
  //
  // The fix: stop using canvas.height as the reference. Use the
  // CSS height of the WebView container instead, which we read
  // from the offsetHeight of the WebView's parent element. If we
  // can't get that, fall back to canvas.height (which will then
  // still be wrong, but at least this is rare).
  //
  // Empirically, on iPhone mini the visible arena is ~187 CSS px
  // tall. The grass+path band in the bgImage starts at the bottom
  // ~25% of the image. When the image fills the 1.85:1 canvas,
  // the walkable band ends up at ~95% of canvas height. So we
  // use 0.95 as the ground fraction.
  const GROUND_FRACTION = 0.95;

  function layout() {
    const n = companions.length;
    if (!n) return;
    const w = canvas.width;
    const h = canvas.height;
    const groundLine = h * GROUND_FRACTION;
    for (let i = 0; i < n; i++) {
      const c = companions[i];
      const [fw, fh] = c.data.frameSize;
      const dw = fw * c.scale;
      const dh = fh * c.scale;
      const x = w * (i + 1) / (n + 1) - dw / 2;
      c.x = x;
      c.y = groundLine - dh; // feet on the ground line, not top-left
    }
  }

  // ── Update + Draw ────────────────────────────────────
  // v3.1.38: state-machine AI (mirrors the desktop's pixel-arena.js).
  // The mobile arena is still a read-only mirror — no click handlers,
  // no toys/treats, no speech bubbles, no user-initiated actions — but
  // the companions now walk and run around on their own. The mobile
  // arena is small and the user notices stillness quickly, so v3.1.39
  // drops idle probability and shortens idle duration vs the desktop's
  // 60/30/10 — mobile uses 30/45/20/5 (idle/walk/run/zoomies) with
  // idle stateTimer 1–3s (was 2–6s). The result: a companion is
  // almost always moving within ~1–2s of loading.
  function pickState(c) {
    const roll = Math.random();
    if (roll < 0.30) {
      // idle — chill in place, but briefly
      c.state = 'idle';
      c.vx = 0;
      c.vy = 0;
      c.stateTimer = 1000 + Math.random() * 2000; // 1–3s
    } else if (roll < 0.75) {
      // walk — gentle wander. Mobile is narrower than the desktop so
      // we use a single horizontal direction (L or R) to keep them
      // on the ground line. The sprite still gets the correct
      // facing row (left vs right) via the direction update below.
      c.state = 'walk';
      c.direction = Math.random() < 0.5 ? 2 : 3; // left or right
      c.vx = c.direction === 2 ? -(0.015 + Math.random() * 0.010) : (0.015 + Math.random() * 0.010);
      c.vy = 0;
      c.stateTimer = 1500 + Math.random() * 2500; // 1.5–4s
    } else if (roll < 0.95) {
      // run — energetic burst
      c.state = 'run';
      c.direction = Math.random() < 0.5 ? 2 : 3;
      c.vx = c.direction === 2 ? -(0.06 + Math.random() * 0.03) : (0.06 + Math.random() * 0.03);
      c.vy = 0;
      c.stateTimer = 800 + Math.random() * 1200; // 0.8–2s
    } else {
      // zoomies — fast dash. Kept short (0.4–0.9s) so the small
      // mobile viewport doesn't turn into a blur of bouncing
      // sprites.
      c.state = 'run';
      c.direction = Math.random() < 0.5 ? 2 : 3;
      c.vx = c.direction === 2 ? -(0.10 + Math.random() * 0.04) : (0.10 + Math.random() * 0.04);
      c.vy = 0;
      c.stateTimer = 400 + Math.random() * 500; // 0.4–0.9s
    }
    c.frame = 0;
    c.frameTimer = 0;
  }

  // v3.1.38: pick the best available animation for the current state.
  // If the state isn't loaded (e.g. the 'walk' PNG is missing on disk)
  // fall back to 'idle' so the companion is never invisible.
  function pickAnim(c) {
    if (c.images[c.state]) return c.images[c.state];
    if (c.images['idle']) return c.images['idle'];
    // No animations at all — return the first one we have, whatever
    // it's called. Better than returning undefined and breaking draw.
    for (const k of Object.keys(c.images)) return c.images[k];
    return null;
  }

  function update(dt) {
    const now = performance.now();
    for (const c of companions) {
      // 1. State timer — roll a new behaviour when it expires.
      c.stateTimer -= dt;
      if (c.stateTimer <= 0) pickState(c);

      // 2. Apply velocity. Mobile is single-row (no vertical movement
      // across the horizon line), so vy stays at 0 and we only update x.
      c.x += c.vx * dt;
      // y is the ground line — clamp to the canvas (small bottom
      // clip is allowed, same as the desktop's loose bounds).
      const [fw, fh] = c.data.frameSize;
      const dw = fw * c.scale;
      const dh = fh * c.scale;
      const halfW = dw / 2;
      const halfH = dh / 2;
      // Sides: bounce. Keep half the sprite visible on each edge.
      if (c.x + halfW < 0) { c.x = -halfW; c.vx = Math.abs(c.vx); c.direction = 3; }
      if (c.x + halfW > canvas.width) { c.x = canvas.width - halfW; c.vx = -Math.abs(c.vx); c.direction = 2; }
      // Vertical bounds — the ground line is at c.y already, and we
      // allow a small clip below the canvas for a "feet partially off
      // screen" feel. Top: don't let them fly above the horizon.
      if (c.y < -halfH) c.y = -halfH;
      if (c.y + halfH > canvas.height) c.y = canvas.height - halfH;

      // 3. While moving, keep the facing row in sync with velocity.
      // (pickState() sets it at state start, but it can drift if we
      // bounced off a wall.) Mirror the desktop's preference: use the
      // side sprites (L/R) for any mostly-horizontal motion.
      if (c.state === 'walk' || c.state === 'run') {
        if (Math.abs(c.vx) > 0.001) c.direction = c.vx < 0 ? 2 : 3;
      }

      // 4. Advance the current animation's frame counter.
      const animData = pickAnim(c);
      if (animData) {
        c.frameTimer += dt;
        if (c.frameTimer >= animData.frameInterval) {
          c.frameTimer = 0;
          c.frame = (c.frame + 1) % animData.frames;
        }
      }
    }
    lastFrame = now;
  }

  // v3.1.35: a small vertical bob for each companion, so the
  // idle pose is visibly alive. The bob is 2 px on a sine wave
  // with a per-companion period (so they don't all bob in sync),
  // computed from c.id so it's stable across renders.
  function bobFor(c) {
    const t = performance.now() * 0.003;
    // Per-id period multiplier in 0.85..1.15 (stable hash)
    let h = 0;
    for (let i = 0; i < c.id.length; i++) h = (h * 31 + c.id.charCodeAt(i)) >>> 0;
    const periodMult = 0.85 + ((h % 100) / 100) * 0.30;
    return Math.sin(t * periodMult) * 2; // -2..+2 px
  }

  // Stars are placed deterministically (no random — would flicker
  // on resize). Each star is a 1-2px white pixel with occasional
  // twinkle. The pattern below has 40 stars spread across the sky
  // region (top 65% of the canvas).
  const STARS = (() => {
    const arr = [];
    let s = 42; // simple LCG seed for reproducibility
    for (let i = 0; i < 40; i++) {
      s = (s * 1103515245 + 12345) & 0x7fffffff;
      const x = (s % 1000) / 1000;
      s = (s * 1103515245 + 12345) & 0x7fffffff;
      const y = ((s % 1000) / 1000) * 0.6; // top 60%
      s = (s * 1103515245 + 12345) & 0x7fffffff;
      const twinkleSpeed = 0.0005 + ((s % 1000) / 1000) * 0.002;
      arr.push({ x, y, twinkleSpeed, phase: (s % 1000) / 1000 * Math.PI * 2 });
    }
    return arr;
  })();

  // v3.1.36: load the desktop's background image (or a custom
  // one set via setBackground). The default is 'forest' to
  // match the desktop's default. If the image fails to load
  // (e.g. file:// blocked, or wrong path), we fall back to the
  // procedural gradient + stars + ground band. Either way the
  // user always sees a visible arena.
  const BACKGROUNDS_BASE = 'file:///android_asset/backgrounds/';
  let bgImage = null;
  let bgLoadFailed = false;
  let currentBgId = 'forest';

  function loadBackground(id) {
    const file = id === 'meadow' ? 'pixel_landscape_1.png'
              : id === 'grove'  ? 'pixel_landscape_3.png'
              : 'pixel_landscape_2.png';  // default 'forest'
    currentBgId = id;
    bgImage = null;
    bgLoadFailed = false;
    const img = new Image();
    img.onload = () => {
      bgImage = img;
      notifyRN({ type: 'arena_bg_loaded', id: id });
    };
    img.onerror = () => {
      bgLoadFailed = true;
      notifyRN({ type: 'arena_bg_load_failed', id: id });
    };
    img.src = BACKGROUNDS_BASE + file;
  }

  // Public wrapper exposed as window.Arena.setBackground.
  function setBackground(id) {
    if (typeof id !== 'string') return;
    loadBackground(id);
  }

  function drawBackground() {
    const w = canvas.width;
    const h = canvas.height;

    // If the background image loaded, draw it covering the
    // whole canvas. This is the SAME image the desktop uses
    // — the mobile is a read-only mirror of the desktop's
    // arena, per the user's instruction.
    if (bgImage && bgImage.complete && bgImage.naturalWidth > 0) {
      ctx.drawImage(bgImage, 0, 0, w, h);
      return;
    }

    // Fallback: procedural gradient + stars + ground band.
    // Used when the image hasn't loaded yet OR failed to load.
    // The skyEnd at 0.65 mirrors the desktop's default
    // horizon line (0.5) — the procedural version puts the
    // horizon a bit lower so the sky has more room for stars.
    const skyEnd = h * 0.65;
    const skyGrad = ctx.createLinearGradient(0, 0, 0, skyEnd);
    skyGrad.addColorStop(0, '#1a1a4a');
    skyGrad.addColorStop(0.5, '#2a2a5a');
    skyGrad.addColorStop(1, '#3a2a3a');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, w, skyEnd);

    // Stars (with twinkle — they get brighter/dimmer slowly)
    const now = performance.now();
    for (const star of STARS) {
      const twinkle = (Math.sin(now * star.twinkleSpeed + star.phase) + 1) * 0.5;
      const alpha = 0.3 + twinkle * 0.7;
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fillRect(star.x * w, star.y * h, 1, 1);
    }

    // Ground band (bottom 35%)
    const groundGrad = ctx.createLinearGradient(0, skyEnd, 0, h);
    groundGrad.addColorStop(0, '#2a3a1a');
    groundGrad.addColorStop(1, '#0a1a0a');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, skyEnd, w, h - skyEnd);

    // Bright horizon line
    ctx.fillStyle = '#f7931a';
    ctx.fillRect(0, skyEnd, w, 1);

    // Grass patches near the ground
    const patchY = skyEnd + 2;
    for (let i = 0; i < 20; i++) {
      const px = (i * 73 + 17) % w;
      ctx.fillStyle = `rgba(${30 + (i % 3) * 10}, ${60 + (i % 4) * 15}, ${20 + (i % 2) * 8}, 0.6)`;
      ctx.fillRect(px, patchY + (i % 3) * 4, 8 + (i % 4) * 4, 3);
    }
  }

  function drawShadow(c) {
    if (!c.shadow || !c.shadow.complete) return;
    const [fw, fh] = c.data.frameSize;
    const sw = fw * c.scale * 1.2;
    const sh = sw * 0.25;
    const sx = c.x + (fw * c.scale - sw) / 2;
    // Shadow stays on the ground (no bob) so the companion
    // appears to "bounce" above the shadow rather than carry
    // it with them.
    const sy = c.y + fh * c.scale - sh * 0.3;
    ctx.globalAlpha = 0.35;
    ctx.drawImage(c.shadow, sx, sy, sw, sh);
    ctx.globalAlpha = 1;
  }

  function drawRing(c) {
    const [fw, fh] = c.data.frameSize;
    const dw = fw * c.scale;
    const dh = fh * c.scale;
    const cx = c.x + dw / 2;
    const cy = (c._drawY !== undefined ? c._drawY : c.y) + dh / 2;
    const r = Math.max(dw, dh) * 0.6;
    if (c.isActive) {
      const t = (Math.sin(lastFrame * 0.003) + 1) * 0.5;
      ctx.strokeStyle = '#f7931a';
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.5 + t * 0.4;
      ctx.beginPath();
      ctx.ellipse(cx, cy + dh * 0.2, r * 1.05, r * 0.35, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else {
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.ellipse(cx, cy + dh * 0.2, r * 1.0, r * 0.33, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawCompanion(c) {
    // v3.1.38: pick the current state's animation (idle/walk/run)
    // and use the direction as the sprite-sheet ROW (0=down, 1=up,
    // 2=left, 3=right — matches the desktop's pixel-arena.js).
    // Previously we only used the idle sheet's first row.
    const animData = pickAnim(c);
    const [fw, fh] = c.data.frameSize;
    const dw = fw * c.scale;
    const dh = fh * c.scale;
    const y = (c._drawY !== undefined ? c._drawY : c.y);
    if (animData && animData.img && animData.img.complete) {
      const cols = animData.cols || animData.frames || 1;
      const rows = animData.rows || 1;
      const col = c.frame % cols;
      // Clamp direction to the rows the sheet actually has. Most
      // sheets are 4 rows (desktop convention) but the catalog
      // doesn't guarantee it for every animation.
      const row = Math.min(c.direction, rows - 1);
      const sx = col * fw;
      const sy = row * fh;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(animData.img, sx, sy, fw, fh, c.x, y, dw, dh);
      return;
    }
    // v3.1.34: fallback if the sprite didn't load — draw a
    // colored rectangle with the companion's initial so the
    // user sees SOMETHING in the arena. This is what we see
    // if the catalog says 'boar' but Boar/Boar_Idle.png
    // 404s, or the WebView blocks file:// images for some
    // reason. Better than an invisible empty arena.
    ctx.fillStyle = c.isActive ? '#f7931a' : '#666';
    ctx.fillRect(c.x, y, dw, dh);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const ch = (c.name || '?').charAt(0).toUpperCase();
    ctx.fillText(ch, c.x + dw / 2, y + dh / 2);
  }

  function drawName(c) {
    if (!c.name) return;
    const [fw, fh] = c.data.frameSize;
    const dw = fw * c.scale;
    const y = (c._drawY !== undefined ? c._drawY : c.y);
    ctx.fillStyle = c.isActive ? '#f7931a' : '#888';
    ctx.font = 'bold 11px "Orbitron", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(c.name, c.x + dw / 2, y - 8);
  }

  function render() {
    drawBackground();
    for (const c of companions) {
      // v3.1.35: apply a small per-companion vertical bob so
      // the idle pose is visibly alive (the sprite sheets
      // have multiple idle frames but they're nearly
      // identical, so a 2px sine-wave bob makes the
      // animation obvious without changing the look).
      const bob = bobFor(c);
      c._drawY = c.y + bob;
      drawShadow(c);
      drawRing(c);
      drawCompanion(c);
      drawName(c);
    }
  }

  function loop(ts) {
    if (!lastFrame) lastFrame = ts;
    const dt = ts - lastFrame;
    lastFrame = ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ── Public API (called from React Native) ──────────────────
  async function setAgents(agents) {
    if (!Array.isArray(agents)) return;
    if (!catalog) return;
    // Cap to MAX_MOBILE_COMPANIONS — the desktop already caps
    // before sending, but if a future desktop regression lets
    // more through, the mobile still shows only 6.
    const MAX = 6;
    const list = agents.length > MAX ? agents.slice(0, MAX) : agents;
    notifyRN({ type: 'arena_set_agents_start', count: list.length });
    let built;
    try {
      built = await Promise.all(list.map(buildCompanion));
    } catch (e) {
      setStatus('setAgents build failed: ' + (e && e.message || e), 'error');
      notifyRN({ type: 'arena_set_agents_failed', error: String(e) });
      return;
    }
    companions = built.filter(Boolean);
    for (const c of companions) c.isActive = (c.id === activeId);
    layout();
    // Diagnostic: report per-companion build results so we can see
    // when sprites failed to load (idle img missing → won't draw).
    const details = companions.map(c => {
      const hasIdle = !!(c.images && c.images.idle && c.images.idle.img && c.images.idle.img.complete);
      const hasShadow = !!(c.shadow && c.shadow.complete);
      return { id: c.id, name: c.name, hasIdle, hasShadow, scale: c.scale };
    });
    notifyRN({ type: 'arena_set_agents', count: companions.length, details });
  }

  function setActive(id) {
    activeId = id || null;
    for (const c of companions) c.isActive = (c.id === activeId);
  }

  window.Arena = {
    setAgents,
    setActive,
    setBackground,        // accepts 'meadow' | 'forest' | 'grove'
    getActiveId: () => activeId,
    getCompanionCount: () => companions.length,
    getBackground: () => currentBgId,
    // v3.1.41: diagnostic — report canvas dimensions and where the
    // first companion is actually positioned. Used for debugging
    // the floating-feet bug; can be removed once we confirm
    // positioning is stable across device sizes.
    getDebug: () => {
      const c0 = companions[0];
      return {
        canvasW: canvas.width,
        canvasH: canvas.height,
        windowInnerW: window.innerWidth,
        windowInnerH: window.innerHeight,
        groundLine: canvas.height * GROUND_FRACTION,
        firstCompanionY: c0 ? c0.y : null,
        firstCompanionScale: c0 ? c0.scale : null,
        firstCompanionDh: c0 ? (c0.data.frameSize[1] * c0.scale) : null,
      };
    },
  };

  // ── React Native bridge ──────────────────────────────
  function notifyRN(payload) {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      try { window.ReactNativeWebView.postMessage(JSON.stringify(payload)); } catch (_) {}
    }
  }

  window.addEventListener('message', (e) => {
    let msg = e.data;
    if (typeof msg === 'string') {
      try { msg = JSON.parse(msg); } catch (_) { return; }
    }
    if (!msg || !msg.type) return;
    if (msg.type === 'setAgents') {
      setAgents(msg.agents);
    } else if (msg.type === 'setActive') {
      setActive(msg.id);
    } else if (msg.type === 'setBackground') {
      loadBackground(msg.id || 'forest');
    }
  });

  // ── Boot ────────────────────────────────────────────
  window.addEventListener('resize', resize);
  resize();
  loadCatalog();
  loadBackground('forest'); // default — matches the desktop's default
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
