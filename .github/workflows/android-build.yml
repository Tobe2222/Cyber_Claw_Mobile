name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# v3.8.6: Node 24 migration. Match the build.yml
# workflow's env block — `FORCE_JAVASCRIPT_ACTIONS_TO_NODE24`
# ensures all JS-based actions on the runner run on
# Node 24 (the new default). Pairs with the @v3 ->
# @v4 bump on setup-node / setup-java / setup-android.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK, CMake, and build tools
        run: |
          echo "y" | sdkmanager "ndk;27.1.12297006" "cmake;3.22.1" "build-tools;36.0.0" "platforms;android-36"

      - name: Install Node dependencies
        run: npm install

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.1.12297006

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-3.2.27
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
