name: Build Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Apply gradle patches
        run: |
          echo "Patching react-native-audio-recorder-player build.gradle..."
          cp patches/react-native-audio-recorder-player-build.gradle node_modules/react-native-audio-recorder-player/android/build.gradle
          echo "Patch applied. Verifying:"
          grep jvmTarget node_modules/react-native-audio-recorder-player/android/build.gradle

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --rerun-tasks

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk CyberClaw-Android.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CyberClaw-Android.apk
          draft: false
