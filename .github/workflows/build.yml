name: Build Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# v3.8.6: GitHub Actions runner moved to Node.js 24 by
# default on 2026-06-02 (deprecation of Node.js 20).
# The previous v3.8.5 build (tag `v3.8.5`, run #541)
# failed at the `android-actions/setup-android@v3`
# step: the action was last updated Nov 2024 and still
# uses Node.js 20 internally. When GitHub forced it
# to run on Node 24, the action's dependency graph
# broke at the SDK-download step. The maintainer
# released v4.0.1 (Apr 2026) specifically to fix this;
# bumping `@v3` -> `@v4` picks up the Node-24-
# compatible version.
#
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 is a belt-and-
# suspenders env var per GitHub's recommended
# migration path (https://github.blog/changelog/
# 2025-09-19-deprecation-of-node-20-on-github-actions-
# runners/). Any remaining Node-20 actions on the
# runner will be forced to run on Node 24, matching
# the rest of the workflow. Pinned to v4 (latest);
# the @v3 -> @v4 jump is what closes the build break.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-android:
    runs-on: ubuntu-latest
    # v3.2.25: explicit job timeout (30 min). The Android build
    # typically takes 9-12 minutes; a 30-min ceiling gives the
    # retry wrapper + Gradle + APK + upload ample headroom while
    # also explicitly satisfying the GitHub Actions requirement.
    # Without this, GitHub cancels jobs after the default 6-hour
    # ceiling (failure mode Tobe hit on the first retry).
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # v3.2.25: bump to Node 24. Node 20 was deprecated
          # 2025-09-19 and runner defaults to 24 now. Stayed on
          # 22 for compatibility with react-native 0.74 dependencies.
          node-version: '24'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK components
        run: |
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1" "build-tools;36.0.0" "platforms;android-36" 2>&1 | tail -5

      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/wrapper/
          rm -rf ~/.gradle/caches/

      - name: Install dependencies
        run: npm ci

      - name: Build Release APK
        working-directory: android
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.1.12297006
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        # Use github.ref_name (e.g. v3.2.28) so the filename
        # matches the tag. Previously hardcoded to "3.2.27",
        # which meant v3.2.28's release shipped a 3.2.27-named
        # APK. Same flag both here and in the upload step.
        run: mv android/app/build/outputs/apk/release/app-release.apk CyberClaw-Android-${{ github.ref_name }}.apk

      - name: Upload to GitHub Release
        # v3.2.25 — retry on transient HttpError. The v3.2.24 build
        # failed here with "other side closed" because the GitHub
        # Releases CDN had a hiccup. The retry wraps the upload so
        # a transient network blip doesn't fail an otherwise-
        # successful build (the APK is already built; only the
        # upload failed).
        uses: nick-fields/retry@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          max_attempts: 4
          retry_on: error
          retry_wait_seconds: 15
          # v3.2.25: nick-fields/retry requires one of these.
          # 5 minutes is more than enough for 4 attempts of
          # upload with 15s waits (worst case ~5 min).
          timeout_minutes: 5
          command: |
            # softprops/action-gh-release handles create-or-update
            # natively, but we invoke it via the CLI for retry
            # compatibility (CLI failures retry; nested action
            # failures do not).
            set -e
            # github.ref_name is already prefixed with "v" (e.g.
            # "v3.2.26"). Don't prepend another v or you get
            # "vv3.2.26" as the release name. This was the bug
            # Tobe spotted in v3.2.24-v3.2.26.
            REF="${{ github.ref_name }}"
            if gh release view "$REF" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              # Release exists — upload (replace) the asset.
              gh release upload "$REF" CyberClaw-Android-${{ github.ref_name }}.apk \
                --repo "${{ github.repository }}" --clobber
            else
              # Release doesn't exist yet — create it.
              gh release create "$REF" \
                --repo "${{ github.repository }}" \
                --title "$REF" \
                --generate-notes \
                CyberClaw-Android-${{ github.ref_name }}.apk
            fi
