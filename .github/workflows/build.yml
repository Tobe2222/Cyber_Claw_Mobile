name: Build Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1" "build-tools;36.0.0" "platforms;android-36" 2>&1 | tail -5

      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/wrapper/
          rm -rf ~/.gradle/caches/

      - name: Install dependencies
        run: npm ci

      - name: Build Release APK
        working-directory: android
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.1.12297006
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk CyberClaw-Android-3.1.88.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CyberClaw-Android-3.1.88.apk
          draft: false
